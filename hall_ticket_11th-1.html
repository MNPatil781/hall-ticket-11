<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>इयत्ता ११ वी – प्रवेशपत्र २०२५-२०२६</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#1a5276 0%,#1a237e 100%);min-height:100vh;padding:20px 10px}
#loginSection{max-width:440px;margin:40px auto;background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.25);overflow:hidden}
.login-header{background:linear-gradient(135deg,#2EAFC0,#1a237e);color:#fff;padding:24px;text-align:center}
.login-header .school-name{font-size:17px;font-weight:700;line-height:1.4}
.login-header .sub{font-size:12px;opacity:.85;margin-top:4px}
.login-body{padding:28px 24px}
.login-body h2{font-size:15px;color:#1a237e;text-align:center;margin-bottom:20px;font-weight:600}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:6px}
.form-group select,.form-group input{width:100%;padding:10px 14px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;font-family:inherit;transition:border .2s;outline:none}
.form-group select:focus,.form-group input:focus{border-color:#2EAFC0}
.btn-login{width:100%;padding:13px;background:linear-gradient(135deg,#2EAFC0,#1a237e);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .2s}
.btn-login:hover{opacity:.9}
.error-msg{color:#c62828;font-size:13px;text-align:center;margin-top:10px;display:none}
#ticketSection{display:none;max-width:680px;margin:0 auto}
.action-bar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;justify-content:center}
.action-bar button{padding:10px 22px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-print{background:#fff;color:#1a237e}
.btn-back{background:rgba(255,255,255,.2);color:#fff;border:2px solid rgba(255,255,255,.5)}
.ticket{background:#fff;border:2px solid #2EAFC0;border-radius:10px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.ticket-header{background:linear-gradient(135deg,#2EAFC0,#1a237e);color:#fff;text-align:center;padding:10px 16px}
.ticket-header .trust{font-size:11px;opacity:.9}
.ticket-header .school{font-size:17px;font-weight:700;margin:4px 0}
.ticket-header .class-row{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.ticket-header .class-label{font-size:12px;opacity:.9}
.ht-badge{background:#fff;color:#1a237e;padding:3px 12px;border-radius:12px;font-size:11px;font-weight:700}
.ticket-body{padding:12px 14px}
.details-grid{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start}
.details-table{width:100%;border-collapse:collapse;font-size:13px}
.details-table td{padding:5px 10px;border:1px solid #B2EBF2}
.details-table .lbl{background:#E0F7FA;font-weight:600;color:#006064;width:150px}
.details-table .val{background:#fff;color:#111}
.photo-box{width:95px;height:115px;border:2px dashed #2EAFC0;border-radius:6px;background:#E0F7FA;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#2EAFC0;font-size:11px;font-weight:600;text-align:center;gap:4px}
.seat-row{margin:10px 0;background:#E0F7FA;border:2px solid #2EAFC0;border-radius:8px;padding:8px 14px;display:flex;align-items:center;gap:14px}
.seat-row .lbl{font-size:13px;font-weight:700;color:#006064}
.seat-row .num{font-size:18px;font-weight:700;color:#1a237e}
.section-hdr{color:#fff;font-weight:700;font-size:12px;text-align:center;padding:6px;margin:8px 0 0;border-radius:4px 4px 0 0}
.tt-hdr{background:linear-gradient(135deg,#2EAFC0,#1a237e)}
.tt-table{width:100%;border-collapse:collapse;font-size:12px}
.tt-table th{background:#B2EBF2;color:#006064;padding:5px;text-align:center;border:1px solid #B2EBF2;font-weight:700}
.tt-table td{padding:5px 8px;border:1px solid #B2EBF2;text-align:center}
.tt-table tr:nth-child(even) td{background:#E0F7FA}
.instr-hdr{background:#D35400}
.instr-table{width:100%;border-collapse:collapse;font-size:11.5px}
.instr-table td{padding:4px 8px;border:1px solid #FAD7A0}
.instr-table .num{background:#FAD7A0;width:28px;text-align:center;font-weight:700;color:#784212}
.warning{font-size:11.5px;font-weight:700;color:#C0392B;background:#FDEDEC;padding:6px 10px;border-left:4px solid #C0392B;margin-top:2px}
.sig-row{display:flex;border-top:2px solid #2EAFC0;margin-top:8px}
.sig-div{flex:1.3;font-size:10px;font-weight:700;color:#fff;text-align:center;padding:10px 6px;background:linear-gradient(135deg,#2EAFC0,#1a237e)}
.sig-line{flex:1;text-align:center;font-size:11px;padding:10px 4px;border-left:1px solid #B2EBF2;color:#333}
.mobile-saved{background:#e8f5e9;border:1px solid #43a047;border-radius:8px;padding:10px 14px;font-size:13px;color:#2e7d32;text-align:center;margin-bottom:12px;display:none}
@media print{
  body{background:#fff!important;padding:0}
  #loginSection,#ticketSection .action-bar,.mobile-saved{display:none!important}
  #ticketSection{display:block!important}
  .ticket{border-color:#999;box-shadow:none}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
}
@page{size:A4 portrait;margin:8mm}
</style>
</head>
<body>

<div id="loginSection">
  <div class="login-header">
    <div class="school-name">न्यू इंग्लिश स्कूल व कनिष्ठ महाविद्यालय, साक्री</div>
    <div class="sub">इयत्ता ११ वी – वार्षिक परीक्षा २०२५-२०२६</div>
  </div>
  <div class="login-body">
    <h2>🎓 प्रवेशपत्र पाहण्यासाठी माहिती भरा</h2>
    <div class="form-group">
      <label>शाखा (Stream) निवडा</label>
      <select id="streamSel" onchange="updateDivisions()">
        <option value="">-- शाखा निवडा --</option>
        <option value="ARTS">ARTS (कला)</option>
        <option value="SCI">SCIENCE / IT (विज्ञान)</option>
        <option value="KIMAN">किमान कौशल्य</option>
      </select>
    </div>
    <div class="form-group">
      <label>तुकडी (Division) निवडा</label>
      <select id="divSel"><option value="">-- आधी शाखा निवडा --</option></select>
    </div>
    <div class="form-group">
      <label>अनुक्रमांक (SR No. / Roll No.)</label>
      <input type="number" id="srInput" placeholder="उदा: 5" min="1">
    </div>
    <div class="form-group">
      <label>मोबाईल नंबर</label>
      <input type="tel" id="mobileInput" placeholder="10 अंकी मोबाईल नंबर" maxlength="10">
    </div>
    <button class="btn-login" onclick="findTicket()">प्रवेशपत्र पाहा →</button>
    <div class="error-msg" id="errMsg">❌ माहिती सापडली नाही. पुन्हा तपासा.</div>
  </div>
</div>

<div id="ticketSection">
  <div class="action-bar">
    <button class="btn-back" onclick="goBack()">← मागे जा</button>
    <button class="btn-print" onclick="window.print()">🖨️ Print / Download करा</button>
  </div>
  <div class="mobile-saved" id="mobileSavedMsg">✅ तुमचा मोबाईल नंबर सेव्ह झाला आहे.</div>
  <div class="ticket" id="ticketContent"></div>
</div>

const DIVISIONS = {"ARTS": ["A", "B", "C ( संयुक्त )"], "SCI": ["A", "B", "C"], "KIMAN": ["AT", "ET"]};
const INSTRUCTIONS = ["उमेदवाराने परीक्षेच्या प्रत्येक सत्रात हे प्रवेशपत्र सोबत आणणे व दाखविणे आवश्यक आहे.", "परीक्षेस येताना ३० मिनिटे आधी उपस्थित रहावे. परीक्षा सुरू झाल्यानंतर ३० मिनिटांनंतर प्रवेश दिला जाणार नाही.", "मोबाईल फोन, कॅल्क्युलेटर व इतर इलेक्ट्रॉनिक साधने परीक्षा केंद्रावर आणणे सक्त मनाई आहे.", "परीक्षार्थ्यांने आपल्या जागेवर बसावे व घंटा होईपर्यंत उत्तरपत्रिका लिहित राहावे.", "परीक्षेत अनुचित प्रकार केल्यास परीक्षार्थीविरुद्ध नियमानुसार कारवाई केली जाईल."];

function updateDivisions() {
  const stream = document.getElementById('streamSel').value;
  const divSel = document.getElementById('divSel');
  divSel.innerHTML = '<option value="">-- तुकडी निवडा --</option>';
  if (!stream) return;
  (DIVISIONS[stream]||[]).forEach(d => {
    const o = document.createElement('option');
    o.value = d; o.textContent = d; divSel.appendChild(o);
  });
}

function saveMobile(key, mobile) {
  try { const s=JSON.parse(localStorage.getItem('ht11_m')||'{}'); s[key]=mobile; localStorage.setItem('ht11_m',JSON.stringify(s)); } catch(e){}
}
function getSavedMobile(key) {
  try { return (JSON.parse(localStorage.getItem('ht11_m')||'{}'))[key]||''; } catch(e){ return ''; }
}

function findTicket() {
  const stream = document.getElementById('streamSel').value;
  const div    = document.getElementById('divSel').value;
  const sr     = document.getElementById('srInput').value.trim();
  const mobile = document.getElementById('mobileInput').value.trim();
  const err    = document.getElementById('errMsg');
  err.style.display='none';
  if (!stream||!div||!sr) { err.textContent='❌ सर्व माहिती भरा.'; err.style.display='block'; return; }
  if (mobile && mobile.length!==10) { err.textContent='❌ मोबाईल नंबर 10 अंकी असावा.'; err.style.display='block'; return; }
  const prefix = stream==='ARTS'?'ARTS_': stream==='SCI'?'SCI_':'KIMAN_';
  const key = prefix+div+'_'+sr;
  const s = STUDENTS[key];
  if (!s) { err.textContent='❌ माहिती सापडली नाही. SR No. व तुकडी पुन्हा तपासा.'; err.style.display='block'; return; }
  let mobileToShow = mobile;
  if (mobile && mobile.length===10) {
    saveMobile(key, mobile);
    document.getElementById('mobileSavedMsg').style.display='block';
  } else {
    const saved = getSavedMobile(key);
    if (saved) mobileToShow = saved;
    document.getElementById('mobileSavedMsg').style.display='none';
  }
  renderTicket(s, mobileToShow);
  document.getElementById('loginSection').style.display='none';
  document.getElementById('ticketSection').style.display='block';
  window.scrollTo(0,0);
}

function renderTicket(s, mobile) {
  const seat = s.seat||'—';
  const seatW = s.seat_words ? '('+s.seat_words+')' : '';
  const pen = s.pen||'—';
  const mother = s.mother||'—';

  const ttRows = s.tt.map((r,i)=>
    '<tr><td>'+(i+1)+'</td><td>'+r[0]+'</td><td>'+r[1]+'</td><td>10:30 ते 01:30</td><td><strong>'+r[2]+'</strong></td></tr>'
  ).join('');

  const instrRows = INSTRUCTIONS.map((ins,i)=>
    '<tr><td class="num">'+(i+1)+'.</td><td style="background:'+(i%2===0?'#FFF':'#FEF9E7')+'">'+ins+'</td></tr>'
  ).join('');

  const mobileRow = mobile ? '<tr><td class="lbl">मोबाईल</td><td class="val">'+mobile+'</td></tr>' : '';

  document.getElementById('ticketContent').innerHTML =
    '<div class="ticket-header">' +
      '<div class="trust">साक्री तालुका एज्युकेशन सोसायटी संचालित, साक्री</div>' +
      '<div class="school">न्यू इंग्लिश स्कूल व कनिष्ठ महाविद्यालय, साक्री</div>' +
      '<div class="class-row">' +
        '<span class="class-label">इयत्ता ११ वी – वार्षिक परीक्षा २०२५-२०२६</span>' +
        '<span class="ht-badge">प्रवेशपत्र / HALL TICKET</span>' +
      '</div>' +
    '</div>' +
    '<div class="ticket-body">' +
      '<div class="details-grid">' +
        '<table class="details-table">' +
          '<tr><td class="lbl">विद्यार्थ्याचे नाव</td><td class="val"><strong>'+s.name+'</strong></td></tr>' +
          '<tr><td class="lbl">वडिलांचे नाव</td><td class="val">'+s.father+'</td></tr>' +
          '<tr><td class="lbl">आईचे नाव</td><td class="val">'+mother+'</td></tr>' +
          '<tr><td class="lbl">नोंदणी क्रमांक</td><td class="val">'+s.gr+'</td></tr>' +
          '<tr><td class="lbl">PEN क्रमांक</td><td class="val">'+pen+'</td></tr>' +
          '<tr><td class="lbl">जात प्रवर्ग</td><td class="val">'+s.cat+'</td></tr>' +
          mobileRow +
        '</table>' +
        '<div class="photo-box">📷<br>फोटो<br>(PHOTO)</div>' +
      '</div>' +
      '<div class="seat-row">' +
        '<div class="lbl">आसन क्रमांक :</div>' +
        '<div class="num">'+seat+' &nbsp;<span style="font-size:14px;color:#006064">'+seatW+'</span></div>' +
      '</div>' +
      '<div class="section-hdr tt-hdr">परीक्षा वेळापत्रक / EXAMINATION TIMETABLE</div>' +
      '<table class="tt-table">' +
        '<thead><tr><th>अ.क्रं.</th><th>वार</th><th>दिनांक</th><th>वेळ</th><th>विषय</th></tr></thead>' +
        '<tbody>'+ttRows+'</tbody>' +
      '</table>' +
      '<div class="section-hdr instr-hdr">परीक्षेसाठी पालन करावयाच्या सूचना</div>' +
      '<table class="instr-table"><tbody>'+instrRows+'</tbody></table>' +
      '<div class="warning">⚠ हे प्रवेशपत्र प्रत्येक सत्रात सोबत आणावे. प्रवेशपत्राशिवाय परीक्षा कक्षात प्रवेश दिला जाणार नाही.</div>' +
      '<div class="sig-row">' +
        '<div class="sig-div">विभाग: '+s.div+' | शाखा: '+s.stream+'</div>' +
        '<div class="sig-line">वर्गशिक्षक स्वाक्षरी<br><small>(Class Teacher)</small></div>' +
        '<div class="sig-line">मुख्याध्यापक स्वाक्षरी<br><small>(Principal)</small></div>' +
      '</div>' +
    '</div>';
}

function goBack() {
  document.getElementById('ticketSection').style.display='none';
  document.getElementById('loginSection').style.display='block';
  document.getElementById('mobileSavedMsg').style.display='none';
}

document.getElementById('srInput').addEventListener('blur', function() {
  const stream = document.getElementById('streamSel').value;
  const div    = document.getElementById('divSel').value;
  const sr     = this.value.trim();
  if (!stream||!div||!sr) return;
  const prefix = stream==='ARTS'?'ARTS_': stream==='SCI'?'SCI_':'KIMAN_';
  const saved = getSavedMobile(prefix+div+'_'+sr);
  if (saved) document.getElementById('mobileInput').value = saved;
});
</script>
